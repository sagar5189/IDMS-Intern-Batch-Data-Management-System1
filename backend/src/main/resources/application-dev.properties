# ===== DATABASE (DEV) =====
spring.datasource.url=jdbc:mysql://localhost:3306/intern_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===== FLYWAY =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== SECURITY (Dev admin credentials) =====
app.security.admin-username=admin
app.security.admin-password=admin123

# ===== CORS =====
app.cors.allowed-origins=http://localhost:4200
