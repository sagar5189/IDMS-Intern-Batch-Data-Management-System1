# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=intern-management

# ══════════════════════════════════════════════════════════════════════════════
#  DATABASE — MySQL (default)
#  Set these three environment variables before starting:
#    DB_URL      e.g. jdbc:mysql://localhost:3306/intern_db?createDatabaseIfNotExist=true&serverTimezone=UTC
#    DB_USERNAME e.g. root
#    DB_PASSWORD e.g. yourpassword
#
#  To run with H2 in-memory for quick local testing (no MySQL needed):
#    mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dspring.profiles.active=h2"
# ══════════════════════════════════════════════════════════════════════════════
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/intern_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# update: creates tables on first run, then only adds new columns — data is never lost.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── H2 Console (disabled when using MySQL) ────────────────────────────────────
spring.h2.console.enabled=false

# ── Connection Pool (HikariCP) ────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JWT ───────────────────────────────────────────────────────────────────────
# Set JWT_SECRET env variable in production. The fallback below is for local dev only.
app.jwt.secret=${JWT_SECRET:InternHubJWTSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
app.jwt.expiration=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# ── Mail / Notifications ──────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.notification.admin-email=${ADMIN_EMAIL:admin@company.com}
app.notification.enabled=false

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.internmgmt=INFO
logging.level.org.springframework.security=WARN