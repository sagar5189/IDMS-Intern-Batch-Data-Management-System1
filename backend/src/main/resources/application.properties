# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=intern-management

# ── MySQL Database ────────────────────────────────────────────────────────────
# Change username and password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/intern_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# update = creates tables on first run, never drops existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── H2 Console (disabled — not needed with MySQL) ────────────────────────────
spring.h2.console.enabled=false

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:InternHubJWTSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
app.jwt.expiration=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200

# ── Mail (disabled) ───────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.notification.admin-email=admin@company.com
app.notification.enabled=false

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.internmgmt=DEBUG
logging.level.org.springframework.security=WARN